version: '3.8'

services:
  novabackup:
    build:
      context: .
      dockerfile: Dockerfile
    image: novabackup:latest
    container_name: novabackup
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - novabackup-data:/app/data
      - novabackup-logs:/app/logs
      - novabackup-backups:/app/backups
      - ./config:/app/config:ro
    environment:
      - NOVABACKUP_ENV=production
      - NOVABACKUP_LOG_LEVEL=info
      - NOVABACKUP_HTTP_PORT=8080
      - NOVABACKUP_HTTPS_PORT=8443
      - NOVABACKUP_DATA_DIR=/app/data
      - NOVABACKUP_BACKUP_DIR=/app/backups
      - NOVABACKUP_LOG_DIR=/app/logs
    networks:
      - novabackup-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL for production deployments
  postgres:
    image: postgres:15-alpine
    container_name: novabackup-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: novabackup
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: novabackup
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - novabackup-network
    profiles:
      - with-db

  # Optional: Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: novabackup-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - novabackup-network
    profiles:
      - with-cache

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: novabackup-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - novabackup-network
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: novabackup-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    networks:
      - novabackup-network
    profiles:
      - monitoring

volumes:
  novabackup-data:
  novabackup-logs:
  novabackup-backups:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  novabackup-network:
    driver: bridge
