name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore & Build Server
        run: |
          dotnet restore src/server/Backup.Server/Backup.Server.csproj
          dotnet build src/server/Backup.Server/Backup.Server.csproj -c Release --no-restore

      - name: Build UI
        run: |
          cd src/ui
          npm install
          npm run build

      - name: Copy UI to wwwroot
        run: cp -r src/ui/build/* src/server/Backup.Server/wwwroot/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/server/Backup.Server/wwwroot'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4