name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  build-server:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore src/server/Backup.Server/Backup.Server.csproj
      
      - name: Build
        run: dotnet build src/server/Backup.Server/Backup.Server.csproj --configuration Release --no-restore
      
      - name: Test
        run: dotnet test src/server/Backup.Server.Tests --configuration Release --no-build --verbosity minimal

      - name: Integration Tests
        run: dotnet test src/server/Backup.Server.IntegrationTests --configuration Release --verbosity minimal

  build-agent-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev
      
      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-agent-linux
          path: build/backup-agent

  build-agent-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022"
          cmake --build . --configuration Release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-agent-windows
          path: build/Release/backup-agent.exe

  docker:
    runs-on: ubuntu-latest
    needs: [build-server]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./src/server
          push: ${{ github.event_name != 'pull_request' }}
          tags: backupsystem/server:latest
          cache-from: type=registry
          cache-to: type=inline
      
      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: ./src/agent
          push: ${{ github.event_name != 'pull_request' }}
          tags: backupsystem/agent:latest
          cache-from: type=registry
          cache-to: type=inline
