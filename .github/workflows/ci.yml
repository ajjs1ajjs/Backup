name: CI

on:
  push:
  pull_request:

jobs:
  linux-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run tests
        run: |
          pytest -q
      - name: Type checking (mypy)
        run: |
          mypy --version || true
          mypy novabackup || true
      - name: Linting (flake8)
        run: |
          flake8 --version || true
          flake8 novabackup tests || true

  windows-python:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.9, 3.11]
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run tests
        run: |
          pytest -q
      - name: Type checking (mypy)
        run: |
          mypy novabackup || true
      - name: Linting (flake8)
        run: |
          flake8 novabackup tests || true
