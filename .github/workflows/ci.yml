name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[api,db] pytest
        # Install cloud provider deps for testing (they are optional but we need them for the tests)
        pip install boto3 azure-mgmt-compute google-api-python-client moto
    - name: Run tests
      run: |
        python -m pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to Docker Hub (optional, not needed for build only)
      # If you want to push, you need to provide DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets
      # We'll skip login for now, just build.
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: novabackup:latest
        load: true  # Load the image into Docker daemon for potential next steps (if any)