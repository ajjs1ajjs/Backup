# GitHub Actions CI/CD for NovaBackup

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  GO_VERSION: '1.25'
  APP_NAME: NovaBackup

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        go-version: ['1.24', '1.25']
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run go fmt
      run: go fmt ./...

    - name: Run go vet
      run: go vet ./...

    - name: Run tests with coverage
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: ${{ matrix.os }}
        name: codecov-${{ matrix.os }}-${{ matrix.go-version }}

    - name: Build
      run: go build -v ./...

  build-windows:
    runs-on: windows-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Build Windows EXE
      run: |
        go build -ldflags="-s -w" -o ${{ env.APP_NAME }}.exe ./cmd/novabackup

    - name: Create distribution package
      run: |
        mkdir dist
        copy ${{ env.APP_NAME }}.exe dist\
        copy -Recurse web\ dist\web\
        copy README.md dist\
        copy LICENSE dist\ 2>$null || echo "No LICENSE file"
        copy INSTALL.md dist\ 2>$null || echo "No INSTALL.md"

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ env.APP_NAME }}-windows-amd64
        path: dist/
        retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Build Linux binary
      run: |
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ${{ env.APP_NAME }} ./cmd/novabackup

    - name: Create distribution package
      run: |
        mkdir dist
        cp ${{ env.APP_NAME }} dist/
        cp -r web/ dist/web/
        cp README.md dist/
        cp LICENSE dist/ 2>/dev/null || echo "No LICENSE file"
        cp INSTALL.md dist/ 2>/dev/null || echo "No INSTALL.md"

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ env.APP_NAME }}-linux-amd64
        path: dist/
        retention-days: 14

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Download Windows artifacts
      uses: actions/download-artifact@v3
      with:
        name: ${{ env.APP_NAME }}-windows-amd64
        path: windows/

    - name: Download Linux artifacts
      uses: actions/download-artifact@v3
      with:
        name: ${{ env.APP_NAME }}-linux-amd64
        path: linux/

    - name: Create Windows release archive
      run: |
        cd windows
        zip -r ../${{ env.APP_NAME }}-windows-amd64.zip .
        cd ..

    - name: Create Linux release archive
      run: |
        cd linux
        tar -czvf ../${{ env.APP_NAME }}-linux-amd64.tar.gz .
        cd ..

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.APP_NAME }}-windows-amd64.zip
          ${{ env.APP_NAME }}-linux-amd64.tar.gz
        generate_release_notes: true
        draft: false
        prerelease: false

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/novabackup:${{ github.ref_name }}
          ${{ secrets.DOCKER_USERNAME }}/novabackup:latest
        platforms: linux/amd64
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/novabackup:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/novabackup:buildcache,mode=max
