<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NovaBackup v6.0 - Enterprise Backup & Disaster Recovery Platform">
  <title>NovaBackup v6.0</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
    }
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .loading-screen h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .loading-screen p {
      font-size: 18px;
      opacity: 0.9;
    }
    .loading-spinner {
      margin-top: 32px;
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <h1>🚀 NovaBackup</h1>
      <p>Loading your dashboard...</p>
      <div class="loading-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
