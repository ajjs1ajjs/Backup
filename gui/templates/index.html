<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBackup v6.0 - Enterprise Backup & Recovery</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #2d5a87 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .neon-border {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .animate-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-online { color: #10b981; }
        .status-offline { color: #ef4444; }
        .status-warning { color: #f59e0b; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function NovaBackupApp() {
            const [systemStatus, setSystemStatus] = useState({
                backup_server: true,
                proxy_server: true,
                repository_server: true,
                deduplication: true,
                encryption: false,
                agent_running: false,
                current_backup: null,
                progress: 0
            });

            const [jobs, setJobs] = useState([
                {
                    id: 1,
                    name: "Daily Documents Backup",
                    type: "Files",
                    status: "Active",
                    last_run: "2026-03-11 02:00",
                    next_run: "2026-03-12 02:00",
                    schedule: "Daily 2AM",
                    source: "C:\\Users\\Documents",
                    destination: "D:\\NovaBackups\\Documents",
                    enabled: true
                },
                {
                    id: 2,
                    name: "Weekly System Backup",
                    type: "System",
                    status: "Active",
                    last_run: "2026-03-08 22:00",
                    next_run: "2026-03-15 22:00",
                    schedule: "Weekly Sun 10PM",
                    source: "C:\\Windows",
                    destination: "D:\\NovaBackups\\System",
                    enabled: true
                },
                {
                    id: 3,
                    name: "Database Backup",
                    type: "SQL Server",
                    status: "Active",
                    last_run: "2026-03-11 01:00",
                    next_run: "2026-03-12 01:00",
                    schedule: "Daily 1AM",
                    source: "SQL Server Instance",
                    destination: "D:\\NovaBackups\\Database",
                    enabled: true
                }
            ]);

            const [showCreateJobModal, setShowCreateJobModal] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [newJob, setNewJob] = useState({
                name: '',
                type: 'Files',
                source: '',
                destination: '',
                schedule: 'Daily',
                enabled: true
            });

            useEffect(() => {
                // Fetch initial data from API
                fetch('/api/status')
                    .then(res => res.json())
                    .then(data => setSystemStatus(data));
                
                fetch('/api/jobs')
                    .then(res => res.json())
                    .then(data => setJobs(data));
            }, []);

            const startBackup = (jobId) => {
                fetch('/api/backup/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_id: jobId })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message);
                        // Update status
                        setSystemStatus(prev => ({ ...prev, agent_running: true, current_backup: jobs.find(j => j.id === jobId).name }));
                    }
                });
            };

            const createJob = () => {
                fetch('/api/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newJob)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        setJobs(prev => [...prev, data.job]);
                        setShowCreateJobModal(false);
                        setNewJob({ name: '', type: 'Files', source: '', destination: '', schedule: 'Daily', enabled: true });
                    }
                });
            };

            const deleteJob = (jobId) => {
                if (confirm('Are you sure you want to delete this backup job?')) {
                    fetch(`/api/jobs/${jobId}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            setJobs(prev => prev.filter(job => job.id !== jobId));
                        }
                    });
                }
            };

            const toggleAgent = () => {
                const endpoint = systemStatus.agent_running ? '/api/agent/stop' : '/api/agent/start';
                fetch(endpoint, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            setSystemStatus(prev => ({ ...prev, agent_running: !prev.agent_running }));
                            alert(data.message);
                        }
                    });
            };

            return React.createElement('div', { className: 'min-h-screen p-4' }, [
                // Header
                React.createElement('div', { className: 'glass-effect rounded-xl p-6 mb-6 neon-border' }, [
                    React.createElement('div', { className: 'flex items-center justify-between' }, [
                        React.createElement('div', null, [
                            React.createElement('h1', { className: 'text-3xl font-bold text-white mb-2' }, 'NovaBackup v6.0'),
                            React.createElement('p', { className: 'text-gray-300' }, 'Enterprise Backup & Recovery Platform')
                        ]),
                        React.createElement('div', { className: 'flex space-x-4' }, [
                            React.createElement('button', {
                                onClick: toggleAgent,
                                className: `px-4 py-2 rounded-lg font-semibold transition-all ${
                                    systemStatus.agent_running 
                                        ? 'bg-red-600 hover:bg-red-700' 
                                        : 'bg-green-600 hover:bg-green-700'
                                } text-white`
                            }, [
                                React.createElement('i', { className: `fas ${systemStatus.agent_running ? 'fa-stop' : 'fa-play'} mr-2` }),
                                systemStatus.agent_running ? 'Stop Agent' : 'Start Agent'
                            ]),
                            React.createElement('button', {
                                onClick: () => setShowSettingsModal(true),
                                className: 'px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg font-semibold text-white transition-all'
                            }, [
                                React.createElement('i', { className: 'fas fa-cog mr-2' }),
                                'Settings'
                            ])
                        ])
                    ])
                ]),

                // Main Content Grid
                React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-6' }, [
                    // Jobs Panel
                    React.createElement('div', { className: 'lg:col-span-2 glass-effect rounded-xl p-6 neon-border' }, [
                        React.createElement('h2', { className: 'text-xl font-bold text-white mb-4 flex items-center' }, [
                            React.createElement('i', { className: 'fas fa-tasks mr-2' }),
                            'Backup Jobs'
                        ]),
                        React.createElement('div', { className: 'space-y-4' }, [
                            React.createElement('div', { className: 'flex justify-between items-center mb-4' }, [
                                React.createElement('h3', { className: 'text-white font-semibold' }, 'Active Jobs'),
                                React.createElement('button', {
                                    onClick: () => setShowCreateJobModal(true),
                                    className: 'px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold text-white transition-all'
                                }, [
                                    React.createElement('i', { className: 'fas fa-plus mr-2' }),
                                    'Create Job'
                                ])
                            ]),
                            React.createElement('div', { className: 'space-y-2' }, 
                                jobs.map(job => 
                                    React.createElement('div', { 
                                        key: job.id,
                                        className: 'glass-effect rounded-lg p-4 hover:bg-white hover:bg-opacity-10 transition-all cursor-pointer'
                                    }, [
                                        React.createElement('div', { className: 'flex justify-between items-start mb-2' }, [
                                            React.createElement('div', null, [
                                                React.createElement('h4', { className: 'text-white font-semibold' }, job.name),
                                                React.createElement('span', { 
                                                    className: `ml-2 px-2 py-1 rounded text-xs ${
                                                        job.type === 'Files' ? 'bg-blue-600' :
                                                        job.type === 'System' ? 'bg-green-600' :
                                                        'bg-purple-600'
                                                    } text-white`
                                                }, job.type)
                                            ]),
                                            React.createElement('div', { className: 'flex space-x-2' }, [
                                                React.createElement('button', {
                                                    onClick: () => startBackup(job.id),
                                                    className: 'px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-white text-sm transition-all'
                                                }, [
                                                    React.createElement('i', { className: 'fas fa-play' })
                                                ]),
                                                React.createElement('button', {
                                                    onClick: () => deleteJob(job.id),
                                                    className: 'px-3 py-1 bg-red-600 hover:bg-red-700 rounded text-white text-sm transition-all'
                                                }, [
                                                    React.createElement('i', { className: 'fas fa-trash' })
                                                ])
                                            ])
                                        ]),
                                        React.createElement('div', { className: 'grid grid-cols-2 gap-4 text-sm text-gray-300' }, [
                                            React.createElement('div', null, [
                                                React.createElement('span', { className: 'block text-gray-400' }, 'Status:'),
                                                React.createElement('span', { className: `status-${job.enabled ? 'online' : 'offline'}` }, job.status)
                                            ]),
                                            React.createElement('div', null, [
                                                React.createElement('span', { className: 'block text-gray-400' }, 'Schedule:'),
                                                React.createElement('span', null, job.schedule)
                                            ]),
                                            React.createElement('div', null, [
                                                React.createElement('span', { className: 'block text-gray-400' }, 'Last Run:'),
                                                React.createElement('span', null, job.last_run)
                                            ]),
                                            React.createElement('div', null, [
                                                React.createElement('span', { className: 'block text-gray-400' }, 'Next Run:'),
                                                React.createElement('span', null, job.next_run)
                                            ])
                                        ])
                                    ])
                                )
                            )
                        ])
                    ]),

                    // System Status Panel
                    React.createElement('div', { className: 'glass-effect rounded-xl p-6 neon-border' }, [
                        React.createElement('h2', { className: 'text-xl font-bold text-white mb-4 flex items-center' }, [
                            React.createElement('i', { className: 'fas fa-server mr-2' }),
                            'System Status'
                        ]),
                        React.createElement('div', { className: 'space-y-4' }, [
                            React.createElement('div', { className: 'space-y-3' }, [
                                React.createElement('div', { className: 'flex justify-between items-center' }, [
                                    React.createElement('span', { className: 'text-gray-300' }, 'Backup Server'),
                                    React.createElement('span', { className: `status-${systemStatus.backup_server ? 'online' : 'offline'}` }, [
                                        React.createElement('i', { className: `fas ${systemStatus.backup_server ? 'fa-check-circle' : 'fa-times-circle'}` })
                                    ])
                                ]),
                                React.createElement('div', { className: 'flex justify-between items-center' }, [
                                    React.createElement('span', { className: 'text-gray-300' }, 'Proxy Server'),
                                    React.createElement('span', { className: `status-${systemStatus.proxy_server ? 'online' : 'offline'}` }, [
                                        React.createElement('i', { className: `fas ${systemStatus.proxy_server ? 'fa-check-circle' : 'fa-times-circle'}` })
                                    ])
                                ]),
                                React.createElement('div', { className: 'flex justify-between items-center' }, [
                                    React.createElement('span', { className: 'text-gray-300' }, 'Repository'),
                                    React.createElement('span', { className: `status-${systemStatus.repository_server ? 'online' : 'offline'}` }, [
                                        React.createElement('i', { className: `fas ${systemStatus.repository_server ? 'fa-check-circle' : 'fa-times-circle'}` })
                                    ])
                                ]),
                                React.createElement('div', { className: 'flex justify-between items-center' }, [
                                    React.createElement('span', { className: 'text-gray-300' }, 'Deduplication'),
                                    React.createElement('span', { className: `status-${systemStatus.deduplication ? 'online' : 'offline'}` }, [
                                        React.createElement('i', { className: `fas ${systemStatus.deduplication ? 'fa-check-circle' : 'fa-times-circle'}` })
                                    ])
                                ]),
                                React.createElement('div', { className: 'flex justify-between items-center' }, [
                                    React.createElement('span', { className: 'text-gray-300' }, 'Encryption'),
                                    React.createElement('span', { className: `status-${systemStatus.encryption ? 'online' : 'offline'}` }, [
                                        React.createElement('i', { className: `fas ${systemStatus.encryption ? 'fa-check-circle' : 'fa-times-circle'}` })
                                    ])
                                ])
                            ]),
                            
                            // Current Backup Progress
                            React.createElement('div', { className: 'mt-6' }, [
                                React.createElement('h3', { className: 'text-white font-semibold mb-3' }, 'Current Backup Progress'),
                                systemStatus.current_backup ? React.createElement('div', { className: 'space-y-2' }, [
                                    React.createElement('div', { className: 'text-gray-300' }, `Running: ${systemStatus.current_backup}`),
                                    React.createElement('div', { className: 'w-full bg-gray-700 rounded-full h-4' }, [
                                        React.createElement('div', {
                                            className: 'bg-blue-600 h-4 rounded-full transition-all duration-500',
                                            style: { width: `${systemStatus.progress}%` }
                                        })
                                    ]),
                                    React.createElement('div', { className: 'text-center text-gray-300 text-sm' }, `${systemStatus.progress}%`)
                                ]) : React.createElement('div', { className: 'text-gray-400 text-center' }, 'No backup running')
                            ])
                        ])
                    ])
                ]),

                // Create Job Modal
                showCreateJobModal && React.createElement('div', { 
                    className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50'
                }, [
                    React.createElement('div', { className: 'glass-effect rounded-xl p-6 w-full max-w-md neon-border' }, [
                        React.createElement('h2', { className: 'text-xl font-bold text-white mb-4' }, 'Create Backup Job'),
                        React.createElement('div', { className: 'space-y-4' }, [
                            React.createElement('div', null, [
                                React.createElement('label', { className: 'block text-gray-300 mb-2' }, 'Job Name'),
                                React.createElement('input', {
                                    type: 'text',
                                    value: newJob.name,
                                    onChange: (e) => setNewJob(prev => ({ ...prev, name: e.target.value })),
                                    className: 'w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500'
                                })
                            ]),
                            React.createElement('div', null, [
                                React.createElement('label', { className: 'block text-gray-300 mb-2' }, 'Source Path'),
                                React.createElement('input', {
                                    type: 'text',
                                    value: newJob.source,
                                    onChange: (e) => setNewJob(prev => ({ ...prev, source: e.target.value })),
                                    className: 'w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500'
                                })
                            ]),
                            React.createElement('div', null, [
                                React.createElement('label', { className: 'block text-gray-300 mb-2' }, 'Destination Path'),
                                React.createElement('input', {
                                    type: 'text',
                                    value: newJob.destination,
                                    onChange: (e) => setNewJob(prev => ({ ...prev, destination: e.target.value })),
                                    className: 'w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500'
                                })
                            ]),
                            React.createElement('div', null, [
                                React.createElement('label', { className: 'block text-gray-300 mb-2' }, 'Schedule'),
                                React.createElement('select', {
                                    value: newJob.schedule,
                                    onChange: (e) => setNewJob(prev => ({ ...prev, schedule: e.target.value })),
                                    className: 'w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500'
                                }, [
                                    React.createElement('option', { value: 'Daily' }, 'Daily'),
                                    React.createElement('option', { value: 'Weekly' }, 'Weekly'),
                                    React.createElement('option', { value: 'Monthly' }, 'Monthly')
                                ])
                            ])
                        ]),
                        React.createElement('div', { className: 'flex justify-end space-x-3 mt-6' }, [
                            React.createElement('button', {
                                onClick: () => setShowCreateJobModal(false),
                                className: 'px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg font-semibold text-white transition-all'
                            }, 'Cancel'),
                            React.createElement('button', {
                                onClick: createJob,
                                className: 'px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold text-white transition-all'
                            }, 'Create Job')
                        ])
                    ])
                ]),

                // Settings Modal
                showSettingsModal && React.createElement('div', {
                    className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50'
                }, [
                    React.createElement('div', { className: 'glass-effect rounded-xl p-6 w-full max-w-md neon-border' }, [
                        React.createElement('h2', { className: 'text-xl font-bold text-white mb-4' }, 'System Settings'),
                        React.createElement('div', { className: 'space-y-4' }, [
                            React.createElement('div', null, [
                                React.createElement('label', { className: 'block text-gray-300 mb-2' }, 'Compression Level'),
                                React.createElement('select', { className: 'w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500' }, [
                                    React.createElement('option', { value: 'None' }, 'None'),
                                    React.createElement('option', { value: 'Low' }, 'Low'),
                                    React.createElement('option', { value: 'Optimal' }, 'Optimal'),
                                    React.createElement('option', { value: 'High' }, 'High'),
                                    React.createElement('option', { value: 'Extreme' }, 'Extreme')
                                ])
                            ]),
                            React.createElement('div', { className: 'flex items-center justify-between' }, [
                                React.createElement('label', { className: 'text-gray-300' }, 'Enable Encryption'),
                                React.createElement('input', { type: 'checkbox', className: 'w-4 h-4' })
                            ]),
                            React.createElement('div', { className: 'flex items-center justify-between' }, [
                                React.createElement('label', { className: 'text-gray-300' }, 'Enable Deduplication'),
                                React.createElement('input', { type: 'checkbox', className: 'w-4 h-4', defaultChecked: true })
                            ])
                        ]),
                        React.createElement('div', { className: 'flex justify-end mt-6' }, [
                            React.createElement('button', {
                                onClick: () => setShowSettingsModal(false),
                                className: 'px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold text-white transition-all'
                            }, 'Close')
                        ])
                    ])
                ])
            ]);
        }

        // Render the app
        ReactDOM.render(React.createElement(NovaBackupApp), document.getElementById('root'));
    </script>
</body>
</html>
