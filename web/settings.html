<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Налаштування - NovaBackup</title>
        <style>
            :root {
                --bg-primary: #0f172a;
                --bg-secondary: #1e293b;
                --bg-card: #334155;
                --accent-blue: #3b82f6;
                --accent-green: #10b981;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #475569;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Segoe UI", sans-serif;
                background: var(--bg-primary);
                color: var(--text-primary);
                padding: 2rem;
            }
            .card {
                background: var(--bg-card);
                border-radius: 1rem;
                border: 1px solid var(--border);
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }
            .card-title {
                font-size: 1.25rem;
                font-weight: 600;
                margin-bottom: 1rem;
            }
            .btn {
                padding: 0.75rem 1.5rem;
                border-radius: 0.5rem;
                font-weight: 600;
                cursor: pointer;
                border: none;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                transition: all 0.2s;
            }
            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            }
            .btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }
            .btn-primary {
                background: linear-gradient(
                    135deg,
                    var(--accent-blue),
                    #2563eb
                );
                color: white;
            }
            .btn-success {
                background: linear-gradient(
                    135deg,
                    var(--accent-green),
                    #059669
                );
                color: white;
            }
            .form-group {
                margin-bottom: 1.25rem;
            }
            .form-label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 600;
            }
            .form-input,
            .form-select {
                width: 100%;
                padding: 0.875rem 1rem;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 0.5rem;
                color: var(--text-primary);
            }
            .form-input:focus {
                outline: none;
                border-color: var(--accent-blue);
            }
            .form-hint {
                font-size: 0.8rem;
                color: var(--text-secondary);
                margin-top: 0.25rem;
            }
            .checkbox-group {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin: 0.5rem 0;
            }
            .checkbox-group input[type="checkbox"] {
                width: 18px;
                height: 18px;
                accent-color: var(--accent-blue);
            }
            .status-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.375rem 0.875rem;
                border-radius: 9999px;
                font-size: 0.75rem;
                font-weight: 700;
                background: rgba(16, 185, 129, 0.2);
                color: #10b981;
            }
            @media (max-width: 768px) {
                body {
                    padding: 1rem;
                }
                .card {
                    padding: 1rem;
                }
            }
        </style>
    </head>
    <body>
        <h1 style="margin-bottom: 2rem">⚙️ Загальні Налаштування</h1>

        <!-- Server Settings -->
        <div class="card">
            <h2 class="card-title">🌐 Налаштування Сервера</h2>

            <div class="form-group">
                <label class="form-label">IP адреса</label>
                <input
                    type="text"
                    class="form-input"
                    id="server-ip"
                    value="0.0.0.0"
                    placeholder="0.0.0.0 (всі інтерфейси)"
                />
                <div class="form-hint">
                    0.0.0.0 - доступ з будь-якого інтерфейсу, 127.0.0.1 - тільки
                    локально
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Порт</label>
                <input
                    type="number"
                    class="form-input"
                    id="server-port"
                    value="8050"
                    min="1024"
                    max="65535"
                />
                <div class="form-hint">
                    Порт для веб-інтерфейсу (1024-65535)
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">HTTPS</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="https-enabled" />
                    <label for="https-enabled">Увімкнути HTTPS</label>
                </div>
            </div>

            <div class="form-group" id="https-port-group" style="display: none">
                <label class="form-label">HTTPS Порт</label>
                <input
                    type="number"
                    class="form-input"
                    id="https-port"
                    value="8443"
                />
            </div>

            <button class="btn btn-primary" onclick="saveServerSettings()">
                💾 Зберегти налаштування
            </button>
        </div>

        <!-- Service Settings -->
        <div class="card">
            <h2 class="card-title">🔧 Налаштування Служби</h2>

            <div class="form-group">
                <label class="form-label">Статус служби</label>
                <div>
                    <span class="status-badge">🟢 Працює</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Автозапуск</label>
                <div class="checkbox-group">
                    <input
                        type="checkbox"
                        id="service-autostart"
                        checked
                        disabled
                    />
                    <label for="service-autostart"
                        >Автоматичний запуск при старті системи</label
                    >
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Дії при помилці</label>
                <select class="form-select" id="service-action">
                    <option value="restart">Перезапустити</option>
                    <option value="stop">Зупинити</option>
                    <option value="ignore">Ігнорувати</option>
                </select>
            </div>

            <div style="display: flex; gap: 1rem">
                <button class="btn btn-success" onclick="restartService()">
                    🔄 Перезапустити службу
                </button>
                <button
                    class="btn"
                    style="background: #ef4444; color: white"
                    onclick="stopService()"
                >
                    ⏹️ Зупинити службу
                </button>
            </div>
        </div>

        <!-- Data Directories -->
        <div class="card">
            <h2 class="card-title">📁 Директорії Даних</h2>

            <div class="form-group">
                <label class="form-label">Шлях до даних</label>
                <input
                    type="text"
                    class="form-input"
                    id="data-dir"
                    value="C:\ProgramData\NovaBackup"
                    readonly
                />
            </div>

            <div class="form-group">
                <label class="form-label">Шлях до бекапів</label>
                <input
                    type="text"
                    class="form-input"
                    id="backup-dir"
                    value="C:\ProgramData\NovaBackup\Backups"
                />
            </div>

            <div class="form-group">
                <label class="form-label">Шлях до логів</label>
                <input
                    type="text"
                    class="form-input"
                    id="logs-dir"
                    value="C:\ProgramData\NovaBackup\Logs"
                    readonly
                />
            </div>

            <button class="btn btn-primary" onclick="saveDirectorySettings()">
                💾 Зберегти
            </button>
        </div>

        <!-- Retention Policy -->
        <div class="card">
            <h2 class="card-title">📅 Політика Зберігання</h2>

            <div class="form-group">
                <label class="form-label">Зберігати бекапи</label>
                <select class="form-select" id="retention-type">
                    <option value="days">За днями</option>
                    <option value="copies">За кількістю копій</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Період зберігання</label>
                <input
                    type="number"
                    class="form-input"
                    id="retention-value"
                    value="30"
                    min="1"
                    max="365"
                />
                <div class="form-hint" id="retention-hint">Днів</div>
            </div>

            <button class="btn btn-primary" onclick="saveRetention()">
                💾 Зберегти
            </button>
        </div>

        <!-- Security Settings -->
        <div class="card">
            <h2 class="card-title">🔐 Безпека</h2>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="allow-scripts" />
                    <label for="allow-scripts"
                        >Дозволити виконання pre/post скриптів</label
                    >
                </div>
                <div class="form-hint">
                    Увімкніть лише для довірених середовищ
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveSecuritySettings()">
                💾 Зберегти
            </button>
        </div>

        <script>
            function getAuthHeaders() {
                const token = localStorage.getItem("authToken");
                const headers = { "Content-Type": "application/json" };
                if (token) {
                    headers.Authorization = "Bearer " + token;
                }
                return headers;
            }

            function ensureAuth() {
                const token = localStorage.getItem("authToken");
                if (!token) {
                    alert("Відсутній токен авторизації");
                    window.location.href = "login.html";
                    return false;
                }
                return true;
            }
            // Toggle HTTPS port
            document
                .getElementById("https-enabled")
                .addEventListener("change", function () {
                    document.getElementById("https-port-group").style.display =
                        this.checked ? "block" : "none";
                });

            // Toggle retention hint
            document
                .getElementById("retention-type")
                .addEventListener("change", function () {
                    document.getElementById("retention-hint").textContent =
                        this.value === "days" ? "Днів" : "Копій";
                });

            // Save server settings
            async function saveServerSettings() {
                if (!ensureAuth()) return;
                const settings = {
                    ip: document.getElementById("server-ip").value,
                    port: parseInt(
                        document.getElementById("server-port").value,
                    ),
                    https: document.getElementById("https-enabled").checked,
                    https_port: parseInt(
                        document.getElementById("https-port").value,
                    ),
                };

                try {
                    const res = await fetch("/api/settings/server", {
                        method: "PUT",
                        headers: getAuthHeaders(),
                        body: JSON.stringify(settings),
                    });

                    if (res.ok) {
                        alert(
                            "✅ Налаштування сервера збережено!\n\nСервер буде перезапущено для застосування змін.",
                        );
                        // Auto restart
                        restartService();
                    } else {
                        alert("❌ Помилка збереження");
                    }
                } catch (error) {
                    alert("✅ Налаштування збережено (демо режим)");
                    console.log("Server settings:", settings);
                }
            }

            // Save directory settings
            async function saveDirectorySettings() {
                if (!ensureAuth()) return;
                const settings = {
                    data_dir: document.getElementById("data-dir").value,
                    backup_dir: document.getElementById("backup-dir").value,
                    logs_dir: document.getElementById("logs-dir").value,
                };

                try {
                    const res = await fetch("/api/settings/directories", {
                        method: "PUT",
                        headers: getAuthHeaders(),
                        body: JSON.stringify(settings),
                    });

                    if (res.ok) {
                        alert("✅ Налаштування директорій збережено!");
                    }
                } catch (error) {
                    alert("✅ Налаштування збережено (демо режим)");
                }
            }

            // Save retention
            async function saveRetention() {
                if (!ensureAuth()) return;
                const settings = {
                    type: document.getElementById("retention-type").value,
                    value: parseInt(
                        document.getElementById("retention-value").value,
                    ),
                };

                try {
                    const res = await fetch("/api/settings/retention", {
                        method: "PUT",
                        headers: getAuthHeaders(),
                        body: JSON.stringify(settings),
                    });

                    if (res.ok) {
                        alert("✅ Політику зберігання збережено!");
                    }
                } catch (error) {
                    alert("✅ Налаштування збережено (демо режим)");
                }
            }

            // Save security settings
            async function saveSecuritySettings() {
                if (!ensureAuth()) return;
                const settings = {
                    allow_scripts:
                        document.getElementById("allow-scripts").checked,
                };

                try {
                    const res = await fetch("/api/settings", {
                        method: "PUT",
                        headers: getAuthHeaders(),
                        body: JSON.stringify({ security: settings }),
                    });
                    if (res.ok) {
                        alert("✅ Налаштування безпеки збережено!");
                    } else {
                        alert("❌ Помилка збереження");
                    }
                } catch (error) {
                    alert("❌ Помилка збереження");
                }
            }

            // Restart service
            async function restartService() {
                if (
                    !confirm(
                        "Перезапустити службу?\n\nВеб-інтерфейс буде недоступний протягом 10-15 секунд.",
                    )
                ) {
                    return;
                }

                try {
                    const res = await fetch("/api/service/restart", {
                        method: "POST",
                    });
                    if (res.ok) {
                        alert("🔄 Службу перезапущено!");
                        setTimeout(() => location.reload(), 5000);
                    }
                } catch (error) {
                    alert("🔄 Службу перезапущено (демо режим)");
                    setTimeout(() => location.reload(), 3000);
                }
            }

            // Stop service
            async function stopService() {
                if (
                    !confirm(
                        "УВАГА! Зупинити службу?\n\nВеб-інтерфейс стане недоступним.",
                    )
                ) {
                    return;
                }

                try {
                    const res = await fetch("/api/service/stop", {
                        method: "POST",
                    });
                    if (res.ok) {
                        alert("⏹️ Службу зупинено");
                    }
                } catch (error) {
                    alert("⏹️ Службу зупинено (демо режим)");
                }
            }

            // Load current settings
            async function loadSettings() {
                try {
                    const res = await fetch("/api/settings", {
                        headers: getAuthHeaders(),
                    });
                    const settings = await res.json();

                    if (settings.server) {
                        document.getElementById("server-ip").value =
                            settings.server.ip || "0.0.0.0";
                        document.getElementById("server-port").value =
                            settings.server.port || 8050;
                        document.getElementById("https-enabled").checked =
                            settings.server.https || false;
                        document.getElementById("https-port").value =
                            settings.server.https_port || 8443;
                    }

                    if (settings.directories) {
                        document.getElementById("backup-dir").value =
                            settings.directories.backup_dir || "";
                    }

                    if (settings.retention) {
                        document.getElementById("retention-type").value =
                            settings.retention.type || "days";
                        document.getElementById("retention-value").value =
                            settings.retention.value || 30;
                        document.getElementById("retention-hint").textContent =
                            settings.retention.type === "days"
                                ? "Днів"
                                : "Копій";
                    }
                    if (settings.security) {
                        document.getElementById("allow-scripts").checked =
                            settings.security.allow_scripts || false;
                    }
                } catch (error) {
                    console.log("Using default settings");
                }
            }

            loadSettings();
        </script>
    </body>
</html>
