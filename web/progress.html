<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогрес Операцій - NovaBackup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .progress-bar {
            height: 24px;
            background: var(--bg-primary);
            border-radius: 12px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.875rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .stat-card {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent-blue); }
        .stat-label { color: var(--text-secondary); font-size: 0.875rem; }
        .log-window {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.875rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry { margin: 0.25rem 0; }
        .log-info { color: var(--accent-blue); }
        .log-success { color: var(--accent-green); }
        .log-warning { color: var(--accent-orange); }
        .log-error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom: 2rem;">📊 Моніторинг Прогресу</h1>

        <div class="card">
            <h2>⚡ Поточна Операція</h2>
            <div id="current-operation" style="margin-top: 1rem;">
                <div id="operation-status" style="font-size: 1.25rem; margin-bottom: 1rem;">
                    ⏸️ Немає активних операцій
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill">0%</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="files-processed">0</div>
                        <div class="stat-label">Файлів оброблено</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="bytes-processed">0 MB</div>
                        <div class="stat-label">Оброблено даних</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="speed">0 MB/s</div>
                        <div class="stat-label">Швидкість</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="eta">--:--</div>
                        <div class="stat-label">Залишилось</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📈 Статистика Сховища</h2>
            <canvas id="storageChart" height="100"></canvas>
        </div>

        <div class="card">
            <h2>📝 Лог Операцій</h2>
            <div class="log-window" id="log-window"></div>
        </div>
    </div>

    <script>
        // WebSocket connection
        let ws;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/api/ws/progress`);

            ws.onopen = () => {
                addLog('✅ Підключено до моніторингу прогресу', 'info');
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                updateProgress(msg);
            };

            ws.onclose = () => {
                addLog('⚠️ З'єднання втрачено. Перепідключення...', 'warning');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                addLog('❌ Помилка WebSocket', 'error');
            };
        }

        function updateProgress(msg) {
            if (msg.type === 'system') {
                addLog(msg.message, 'info');
                return;
            }

            // Update status
            const statusEl = document.getElementById('operation-status');
            const icons = {
                'running': '⚡',
                'success': '✅',
                'failed': '❌',
                'warning': '⚠️'
            };
            statusEl.innerHTML = `${icons[msg.status] || '⏸️'} ${msg.type.toUpperCase()}: ${msg.message || 'Виконується...'}`;

            // Update progress bar
            const fill = document.getElementById('progress-fill');
            fill.style.width = msg.percent + '%';
            fill.textContent = msg.percent.toFixed(1) + '%';

            // Update stats
            document.getElementById('files-processed').textContent = msg.files_processed || 0;
            document.getElementById('bytes-processed').textContent = formatBytes(msg.bytes_processed || 0);
            document.getElementById('speed').textContent = msg.speed || '0 MB/s';
            document.getElementById('eta').textContent = msg.eta || '--:--';

            // Add log entry
            if (msg.message) {
                addLog(`[${msg.type}] ${msg.message}`, msg.status);
            }
        }

        function addLog(message, type = 'info') {
            const logWindow = document.getElementById('log-window');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('uk-UA');
            entry.textContent = `[${time}] ${message}`;
            logWindow.appendChild(entry);
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Storage Chart
        function initStorageChart() {
            const ctx = document.getElementById('storageChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Використано', 'Вільно'],
                    datasets: [{
                        data: [350, 650], // Example data
                        backgroundColor: ['#3b82f6', '#334155'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#f1f5f9' }
                        }
                    }
                }
            });
        }

        // Initialize
        connectWebSocket();
        initStorageChart();

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                location.reload();
            }
        });
    </script>
</body>
</html>
