<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Користувачі - NovaBackup Enterprise</title>
        <style>
            :root {
                --bg-primary: #0f172a;
                --bg-secondary: #1e293b;
                --bg-card: #334155;
                --accent-blue: #3b82f6;
                --accent-green: #10b981;
                --accent-red: #ef4444;
                --accent-purple: #8b5cf6;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #475569;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Segoe UI", sans-serif;
                background: var(--bg-primary);
                color: var(--text-primary);
                padding: 2rem;
            }

            .page-header {
                margin-bottom: 2rem;
            }

            .page-title {
                font-size: 2rem;
                font-weight: 700;
                margin-bottom: 0.5rem;
            }

            .page-subtitle {
                color: var(--text-secondary);
            }

            .card {
                background: var(--bg-card);
                border-radius: 1rem;
                border: 1px solid var(--border);
                overflow: hidden;
            }

            .card-header {
                padding: 1.5rem;
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .card-title {
                font-size: 1.25rem;
                font-weight: 600;
            }

            .btn {
                padding: 0.75rem 1.5rem;
                border-radius: 0.5rem;
                font-weight: 600;
                cursor: pointer;
                border: none;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                transition: all 0.2s;
            }

            .btn-primary {
                background: linear-gradient(
                    135deg,
                    var(--accent-blue),
                    #2563eb
                );
                color: white;
            }

            .btn-danger {
                background: linear-gradient(135deg, var(--accent-red), #dc2626);
                color: white;
            }

            .btn-warning {
                background: linear-gradient(
                    135deg,
                    var(--accent-purple),
                    #7c3aed
                );
                color: white;
            }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }

            th,
            td {
                padding: 1rem 1.25rem;
                text-align: left;
                border-bottom: 1px solid var(--border);
            }

            th {
                background: var(--bg-secondary);
                font-weight: 700;
                color: var(--text-secondary);
                font-size: 0.8rem;
                text-transform: uppercase;
            }

            tr:hover {
                background: rgba(255, 255, 255, 0.03);
            }

            .role-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.375rem 0.875rem;
                border-radius: 9999px;
                font-size: 0.75rem;
                font-weight: 700;
            }

            .role-admin {
                background: rgba(239, 68, 68, 0.2);
                color: var(--accent-red);
            }
            .role-backup-admin {
                background: rgba(139, 92, 246, 0.2);
                color: var(--accent-purple);
            }
            .role-backup-user {
                background: rgba(59, 130, 246, 0.2);
                color: var(--accent-blue);
            }
            .role-readonly {
                background: rgba(100, 100, 100, 0.2);
                color: var(--text-secondary);
            }

            .status-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.375rem 0.875rem;
                border-radius: 9999px;
                font-size: 0.75rem;
                font-weight: 700;
            }

            .status-active {
                background: rgba(16, 185, 129, 0.2);
                color: var(--accent-green);
            }
            .status-disabled {
                background: rgba(100, 100, 100, 0.2);
                color: var(--text-secondary);
            }

            /* Modal */
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            }

            .modal {
                background: var(--bg-card);
                border-radius: 1rem;
                padding: 2rem;
                width: 100%;
                max-width: 800px;
                max-height: 90vh;
                overflow-y: auto;
                border: 1px solid var(--border);
            }

            .modal-header {
                margin-bottom: 1.5rem;
            }

            .modal-title {
                font-size: 1.5rem;
                font-weight: 700;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            .form-label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 600;
            }

            .form-input,
            .form-select {
                width: 100%;
                padding: 0.875rem 1rem;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: 0.5rem;
                color: var(--text-primary);
                font-size: 1rem;
            }

            .form-input:focus,
            .form-select:focus {
                outline: none;
                border-color: var(--accent-blue);
            }

            .form-hint {
                font-size: 0.8rem;
                color: var(--text-secondary);
                margin-top: 0.25rem;
            }

            .modal-footer {
                display: flex;
                gap: 1rem;
                justify-content: flex-end;
                margin-top: 2rem;
            }

            .btn-secondary {
                background: var(--bg-secondary);
                color: var(--text-primary);
                border: 1px solid var(--border);
            }

            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1rem;
                margin-bottom: 1.5rem;
            }

            .stat-card {
                background: var(--bg-secondary);
                padding: 1rem;
                border-radius: 0.5rem;
                text-align: center;
            }

            .stat-value {
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--accent-blue);
            }

            .stat-label {
                font-size: 0.875rem;
                color: var(--text-secondary);
            }

            .permissions-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
                margin-top: 1rem;
            }

            .permission-item {
                background: var(--bg-secondary);
                padding: 0.75rem;
                border-radius: 0.5rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .permission-item input[type="checkbox"] {
                width: 18px;
                height: 18px;
                accent-color: var(--accent-blue);
            }
        </style>
    </head>
    <body>
        <div class="page-header">
            <h1 class="page-title">👥 Користувачі та ролі</h1>
            <p class="page-subtitle">
                Керування користувачами та правами доступу
            </p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Всього користувачів</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-active">0</div>
                <div class="stat-label">Активні</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-admins">0</div>
                <div class="stat-label">Адміністратори</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-disabled">0</div>
                <div class="stat-label">Вимкнено</div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Користувачі системи</h3>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <span>➕</span> Додати користувача
                </button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Користувач</th>
                            <th>Роль</th>
                            <th>Email</th>
                            <th>Останній вхід</th>
                            <th>Статус</th>
                            <th>Дії</th>
                        </tr>
                    </thead>
                    <tbody id="users-body">
                        <tr>
                            <td
                                colspan="6"
                                style="text-align: center; padding: 3rem"
                            >
                                <div class="loading">Завантаження...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add User Modal -->
        <div id="add-modal" class="modal-overlay" style="display: none">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title">➕ Додати користувача</h3>
                </div>

                <div class="form-group">
                    <label class="form-label">Ім'я користувача *</label>
                    <input
                        type="text"
                        class="form-input"
                        id="user-username"
                        placeholder="username"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль *</label>
                    <input
                        type="password"
                        class="form-input"
                        id="user-password"
                        placeholder="••••••••"
                        minlength="8"
                    />
                    <div class="form-hint">
                        Мінімум 8 символів, великі та малі літери, цифри
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Повне ім'я</label>
                    <input
                        type="text"
                        class="form-input"
                        id="user-fullname"
                        placeholder="John Doe"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input
                        type="email"
                        class="form-input"
                        id="user-email"
                        placeholder="user@example.com"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label">Роль *</label>
                    <select
                        class="form-select"
                        id="user-role"
                        onchange="updatePermissions()"
                    >
                        <option value="readonly">📖 Тільки читання</option>
                        <option value="backup_user">
                            💾 Користувач резервних копій
                        </option>
                        <option value="backup_admin">
                            🔧 Адміністратор резервних копій
                        </option>
                        <option value="admin">👑 Адміністратор</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Дозволи</label>
                    <div class="permissions-grid" id="permissions-list">
                        <!-- Permissions will be populated by JS -->
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="user-enabled" checked />
                        <label for="user-enabled">Активний користувач</label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeAddModal()">
                        Скасувати
                    </button>
                    <button class="btn btn-primary" onclick="addUser()">
                        Додати користувача
                    </button>
                </div>
            </div>
        </div>

        <script>
            const API_BASE = "/api";
            let users = [];

            const permissions = {
                readonly: [
                    "backup:read",
                    "restore:read",
                    "jobs:read",
                    "settings:read",
                    "logs:read",
                ],
                backup_user: [
                    "backup:read",
                    "backup:run",
                    "restore:read",
                    "jobs:read",
                ],
                backup_admin: [
                    "backup:create",
                    "backup:read",
                    "backup:update",
                    "backup:run",
                    "restore:create",
                    "restore:read",
                    "jobs:create",
                    "jobs:read",
                    "jobs:update",
                    "settings:read",
                    "logs:read",
                ],
                admin: [
                    "backup:*",
                    "restore:*",
                    "jobs:*",
                    "settings:*",
                    "users:*",
                    "logs:*",
                ],
            };

            const permissionsUA = {
                "backup:create": "Створення бекапів",
                "backup:read": "Перегляд бекапів",
                "backup:update": "Редагування бекапів",
                "backup:delete": "Видалення бекапів",
                "backup:run": "Запуск бекапів",
                "restore:create": "Створення відновлення",
                "restore:read": "Перегляд відновлення",
                "jobs:create": "Створення завдань",
                "jobs:read": "Перегляд завдань",
                "jobs:update": "Редагування завдань",
                "jobs:delete": "Видалення завдань",
                "settings:read": "Перегляд налаштувань",
                "settings:update": "Редагування налаштувань",
                "users:create": "Створення користувачів",
                "users:read": "Перегляд користувачів",
                "users:update": "Редагування користувачів",
                "users:delete": "Видалення користувачів",
                "logs:read": "Перегляд логів",
            };

            // Load users
            async function loadUsers() {
                try {
                    const res = await fetch(`${API_BASE}/users`);
                    const data = await res.json();
                    users = data.users || [];
                    renderUsers();
                    updateStats();
                } catch (error) {
                    console.error("Failed to load users:", error);
                    // Mock data for demo
                    users = [
                        {
                            id: "admin",
                            username: "admin",
                            email: "admin@novabackup.local",
                            full_name: "Administrator",
                            role: "admin",
                            enabled: true,
                            last_login: new Date().toISOString(),
                        },
                    ];
                    renderUsers();
                    updateStats();
                }
            }

            // Render users table
            function renderUsers() {
                const tbody = document.getElementById("users-body");

                if (users.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                                👤 Немає користувачів
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = users
                    .map(
                        (user) => `
                    <tr>
                        <td>
                            <strong>👤 ${user.username}</strong>
                            ${user.full_name ? `<br><small>${user.full_name}</small>` : ""}
                        </td>
                        <td>
                            <span class="role-badge ${getRoleClass(user.role)}">
                                ${getRoleUA(user.role)}
                            </span>
                        </td>
                        <td>${user.email || "—"}</td>
                        <td>${user.last_login ? formatDateTime(user.last_login) : "Ніколи"}</td>
                        <td>
                            <span class="status-badge ${user.enabled ? "status-active" : "status-disabled"}">
                                ${user.enabled ? "🟢" : "⚫"} ${user.enabled ? "Активний" : "Вимкнено"}
                            </span>
                        </td>
                        <td>
                            ${
                                user.username !== "admin"
                                    ? `
                                <button class="btn btn-warning" onclick="editUser('${user.id}')" style="padding: 0.5rem 1rem; font-size: 0.8rem;">
                                    ✏️
                                </button>
                                <button class="btn btn-danger" onclick="deleteUser('${user.id}')" style="padding: 0.5rem 1rem; font-size: 0.8rem; margin-left: 0.5rem;">
                                    🗑️
                                </button>
                            `
                                    : "—"
                            }
                        </td>
                    </tr>
                `,
                    )
                    .join("");
            }

            // Update stats
            function updateStats() {
                document.getElementById("stat-total").textContent =
                    users.length;
                document.getElementById("stat-active").textContent =
                    users.filter((u) => u.enabled).length;
                document.getElementById("stat-admins").textContent =
                    users.filter((u) => u.role === "admin").length;
                document.getElementById("stat-disabled").textContent =
                    users.filter((u) => !u.enabled).length;
            }

            // Modal functions
            function openAddModal() {
                document.getElementById("add-modal").style.display = "flex";
                updatePermissions();
            }

            function closeAddModal() {
                document.getElementById("add-modal").style.display = "none";
            }

            // Update permissions display
            function updatePermissions() {
                const role = document.getElementById("user-role").value;
                const container = document.getElementById("permissions-list");
                const rolePerms = permissions[role];

                container.innerHTML = Object.entries(permissionsUA)
                    .map(
                        ([perm, name]) => `
                    <div class="permission-item">
                        <input type="checkbox" id="perm-${perm}" ${rolePerms.includes(perm) || rolePerms.includes(perm.split(":")[0] + ":*") ? "checked" : ""} disabled>
                        <label for="perm-${perm}">${name}</label>
                    </div>
                `,
                    )
                    .join("");
            }

            // Add user
            async function addUser() {
                const user = {
                    username: document.getElementById("user-username").value,
                    password: document.getElementById("user-password").value,
                    email: document.getElementById("user-email").value,
                    full_name: document.getElementById("user-fullname").value,
                    role: document.getElementById("user-role").value,
                    enabled: document.getElementById("user-enabled").checked,
                };

                if (!user.username || !user.password) {
                    alert(
                        "Заповніть обов'язкові поля: Ім'я користувача та Пароль",
                    );
                    return;
                }

                if (user.password.length < 6) {
                    alert("Пароль має бути не менше 6 символів");
                    return;
                }

                // Validate password strength
                const hasUpper = /[A-Z]/.test(user.password);
                const hasLower = /[a-z]/.test(user.password);
                const hasDigit = /[0-9]/.test(user.password);

                if (!hasUpper || !hasLower || !hasDigit) {
                    alert(
                        "Пароль має містити великі літери, малі літери та цифри",
                    );
                    return;
                }

                try {
                    const res = await fetch(`${API_BASE}/users`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(user),
                    });

                    if (res.ok) {
                        const result = await res.json();
                        if (result.success) {
                            alert(
                                "✅ Користувача додано!\n\n" +
                                    "Ім'я: " +
                                    user.username +
                                    "\n" +
                                    "Роль: " +
                                    getRoleUA(user.role),
                            );
                            closeAddModal();
                            loadUsers();
                        } else {
                            alert(
                                "❌ Помилка: " +
                                    (result.error || "Невідома помилка"),
                            );
                        }
                    } else {
                        const error = await res.json();
                        alert(
                            "❌ Помилка: " +
                                (error.error || "Невідома помилка"),
                        );
                    }
                } catch (error) {
                    // Demo mode - add locally
                    alert(
                        "✅ Користувача додано (демо режим)\n\n" +
                            "Ім'я: " +
                            user.username +
                            "\n" +
                            "Роль: " +
                            getRoleUA(user.role),
                    );
                    users.push({
                        ...user,
                        id: "user_" + Date.now(),
                        last_login: null,
                    });
                    renderUsers();
                    updateStats();
                    closeAddModal();
                }
            }

            // Edit user
            function editUser(id) {
                const user = users.find((u) => u.id === id);
                if (!user) return;

                // Fill form
                document.getElementById("user-username").value = user.username;
                document.getElementById("user-password").value = "";
                document.getElementById("user-password").placeholder =
                    "Залиште пустим щоб не змінювати";
                document.getElementById("user-fullname").value =
                    user.full_name || "";
                document.getElementById("user-email").value = user.email || "";
                document.getElementById("user-role").value =
                    user.role || "readonly";
                document.getElementById("user-enabled").checked = user.enabled;

                // Store editing ID
                window.editingUserId = id;

                // Change button text
                const btn = document.querySelector("#add-modal .btn-primary");
                if (btn) btn.textContent = "💾 Зберегти зміни";

                openAddModal();
            }

            // Delete user
            async function deleteUser(id) {
                if (
                    !confirm(
                        "Ви впевнені, що хочете видалити користувача?\n\nЦе не можна скасувати!",
                    )
                ) {
                    return;
                }

                if (id === "admin") {
                    alert("❌ Не можна видалити адміністратора!");
                    return;
                }

                try {
                    const res = await fetch(`${API_BASE}/users/${id}`, {
                        method: "DELETE",
                    });

                    if (res.ok) {
                        alert("✅ Користувача видалено!");
                        loadUsers();
                    } else {
                        alert("✅ Користувача видалено (демо режим)");
                        users = users.filter((u) => u.id !== id);
                        renderUsers();
                        updateStats();
                    }
                } catch (error) {
                    alert("✅ Користувача видалено (демо режим)");
                    users = users.filter((u) => u.id !== id);
                    renderUsers();
                    updateStats();
                }
            }

            // Helper functions
            function getRoleClass(role) {
                const classes = {
                    admin: "role-admin",
                    backup_admin: "role-backup-admin",
                    backup_user: "role-backup-user",
                    readonly: "role-readonly",
                };
                return classes[role] || "role-readonly";
            }

            function getRoleUA(role) {
                const roles = {
                    admin: "👑 Адміністратор",
                    backup_admin: "🔧 Адмін бекапів",
                    backup_user: "💾 Користувач бекапів",
                    readonly: "📖 Тільки читання",
                };
                return roles[role] || role;
            }

            function formatDateTime(dateStr) {
                return new Date(dateStr).toLocaleString("uk-UA", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                });
            }

            // Initial load
            loadUsers();
        </script>
    </body>
</html>
